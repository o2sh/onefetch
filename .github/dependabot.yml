version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    groups:
      clap:
        patterns:
          - "clap"
          - "clap_*"
      gix:
        patterns:
          - "gix"
          - "gix-*"
      image:
        patterns:
          - "image"
          - "color_quant"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: npm
    directory: /docs/web
    groups:
      site:
        patterns:
          - "*"
    schedule:
      interval: monthly
